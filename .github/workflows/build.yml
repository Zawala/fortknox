name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Clean
        run: ./mvnw clean

      - name: Compile
        run: ./mvnw compile

      - name: Verify
        run: ./mvnw verify

      - name: Package
        run: ./mvnw package -DskipTests

      - name: Final clean
        run: ./mvnw clean
